review_cadence_policy:
  id: policy.review.default_v0_1
  status: active
  title: Default review cadence policy
  description: Fixed review cadence for converting passed nodes into durable knowledge.
  cadence_kind: fixed_intervals
  intervals:
    -
      label: first_recall
      days_after_pass: 1
      expected_minutes: 15
      required_for_mastery: false
    -
      label: mastery_recall
      days_after_pass: 3
      expected_minutes: 15
      required_for_mastery: true
    -
      label: retention_recall
      days_after_pass: 7
      expected_minutes: 20
      required_for_mastery: false
  schedule_reviews_after_pass: true
  schedule_reviews_after_mastery: false
  missed_review_grace_days: 2
  created_at: 2026-06-28
  updated_at: 2026-06-28
