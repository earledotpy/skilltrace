mastery_promotion_policy:
  id: policy.mastery.default_v0_6
  status: active
  title: Mastery eligibility values
  description: >
    Seed values for the mastery-eligibility derivation (CONTEXT.md): the
    node is passed, accepted evidence is on file, and a satisfactory
    post-pass review was completed with the required day spacing. Any
    satisfactory post-pass review counts — no interval or label is special.
    Eligibility is derived on demand, never stored; `skilltrace master` is
    the only way to assert mastery and refuses unless eligibility holds.
    Explicit learner confirmation is the command itself, not a value here.
  min_accepted_evidence: 1
  min_days_pass_to_review: 3
  created_at: 2026-07-04
  updated_at: 2026-07-04
