recommendation_policy:
  id: policy.recommendation.default_v0_6
  status: active
  title: Recommendation weights
  description: >
    Pure factor-weight map for policy-adjusted recommendations. Locked nodes
    are filtered out before scoring — hard prerequisites are a gate, not a
    weight, so no readiness factor appears here. Track names are opaque
    (decision 18): each node's track is looked up in track_weights; an
    unmapped track scores 0 and warns. Weights are the only mechanism —
    there are no boolean preference switches to disagree with them.
  factor_weights:
    track_priority: 3.0
    downstream_leverage: 2.0
    micro_session_fit: 1.0
    active_continuation: 2.0
    remediation_priority: 4.0
    review_due: 2.0
    blocker_penalty: -3.0
  track_weights:
    foundational: 3.0
    core: 2.0
    portfolio: 1.0
  created_at: 2026-07-04
  updated_at: 2026-07-04
