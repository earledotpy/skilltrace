remediation_policy:
  id: policy.remediation.default_v0_6
  status: active
  title: Remediation policy values
  description: >
    A remediation edge activates on exactly two derived signals (CONTEXT.md):
    an open Blocker on its target, or the target reaching the failed-attempt
    threshold below without a pass. An open blocker always activates — only
    the attempt threshold is tunable. Activation is derived on demand, never
    stored, and never locks the target. All pressure values here are
    advisory: they warn and reorder recommendations, never block.
  failed_attempt_threshold: 3
  suggestion_defaults:
    suggested_minutes: 30
    due_in_days: 1
  max_open_remediations: 5
  created_at: 2026-07-04
  updated_at: 2026-07-04
