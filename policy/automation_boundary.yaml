automation_boundary_policy:
  id: policy.automation.default_v0_6
  status: active
  title: Automation boundary
  description: >
    Which actions may fire as an automated side effect of another command.
    Two permissions only — allowed / forbidden; an explicit learner command
    is by definition manual and needs no rule here, and anything unlisted
    fails closed. The forbidden trio mirrors the engine's hard-boundary
    constants (ADR 0004): the engine refuses them unconditionally, and
    `validate policy` fails if this file ever disagrees with the constants.
  rules:
    -
      action: schedule_review
      permission: allowed
      reason: Review auto-scheduling on pass per the cadence policy is the one sanctioned automation.
    -
      action: sync_readiness
      permission: allowed
      reason: Sync writes only derived readiness (locked/available), never asserted progress.
    -
      action: pass_node
      permission: forbidden
      reason: Hard boundary — passing is an explicit, evidence-backed learner command.
    -
      action: master_node
      permission: forbidden
      reason: Hard boundary — mastery is an explicit learner command gated by derived eligibility.
    -
      action: delete_record
      permission: forbidden
      reason: Hard boundary — records are immutable; corrections supersede, never delete.
  created_at: 2026-07-04
  updated_at: 2026-07-04
