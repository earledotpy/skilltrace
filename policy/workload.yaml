workload_policy:
  id: policy.workload.default_v0_1
  status: active
  title: Default workload policy
  description: Conservative workload limits for sustainable self-directed study.
  limits:
    -
      limit_kind: daily_minutes
      value: 180
      warning_threshold: 120
      hard_limit: false
      description: Warn when daily planned study exceeds normal sustainable load.
    -
      limit_kind: session_minutes
      value: 180
      warning_threshold: 90
      hard_limit: false
      description: Warn when a single session becomes long enough to require deep-work conditions.
    -
      limit_kind: active_node_count
      value: 3
      warning_threshold: 2
      hard_limit: false
      description: Limit concurrent active nodes to reduce context switching.
    -
      limit_kind: deep_work_blocks_per_week
      value: 2
      warning_threshold: 1
      hard_limit: false
      description: Keep deep-work sessions scarce and deliberate.
    -
      limit_kind: new_nodes_per_day
      value: 2
      warning_threshold: 1
      hard_limit: false
      description: Avoid opening too many new nodes in one day.
  prefer_micro_sessions_when_low_energy: true
  low_energy_threshold: 2
  avoid_new_nodes_when_open_blockers: true
  created_at: 2026-06-28
  updated_at: 2026-06-28
