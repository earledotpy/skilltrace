workload_policy:
  id: policy.workload.default_v0_6
  status: active
  title: Workload advisory limits
  description: >
    Advisory-only workload values: the engine warns as warning_threshold
    and then value are crossed. There is deliberately no way to express a
    blocking limit in this schema — advisory policies never block a
    human-initiated action. Session templates are opaque labels whose
    expected minutes exist only for advisory comparison; the session
    envelope stays authoritative.
  limits:
    -
      limit_kind: daily_minutes
      value: 180
      warning_threshold: 120
      description: Warn when daily study time exceeds sustainable load.
    -
      limit_kind: session_minutes
      value: 180
      warning_threshold: 90
      description: Warn when a single session runs long enough to need deep-work conditions.
    -
      limit_kind: active_node_count
      value: 3
      warning_threshold: 2
      description: Warn when concurrent active nodes invite context switching.
    -
      limit_kind: deep_work_blocks_per_week
      value: 2
      warning_threshold: 1
      description: Keep deep-work sessions scarce and deliberate.
    -
      limit_kind: new_nodes_per_day
      value: 2
      warning_threshold: 1
      description: Warn against opening too many new nodes in one day.
  stale_session_hours: 12
  session_templates:
    micro:
      expected_minutes: 15
    standard:
      expected_minutes: 45
    deep:
      expected_minutes: 90
  created_at: 2026-07-04
  updated_at: 2026-07-04
